<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ish beruvchi - IshTop.uz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <header>
        <div class="container">
            <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">Ish<span>Top</span>
                    <small style="color:white;font-size:12px;">(Kompaniya)</small></a></div>
            <nav>
                <a href="#add-job">Vakansiya e'lon qilish</a>
                <a href="#resumes">Rezyumelar bazasi</a>
                <a href="index.html"
                    style="background:#ef4444;padding:8px 15px;border-radius:6px;margin-left:15px;">Chiqish</a>
            </nav>
        </div>
    </header>

    <section class="add-job-section" id="add-job" style="margin-top: 40px;">
        <h2>Yangi Vakansiya Qo'shish</h2>
        <form id="addJobForm" class="add-job-form">
            <label>
                <span>Lavozim *</span>
                <input type="text" name="title" required placeholder="Masalan: Frontend Developer">
            </label>
            <label>
                <span>Kompaniya *</span>
                <input type="text" name="company" required placeholder="Kompaniya nomi">
            </label>
            <label>
                <span>Joylashuv *</span>
                <input type="text" name="location" required placeholder="Masalan: Toshkent">
            </label>
            <label>
                <span>Maosh</span>
                <input type="text" name="salary" placeholder="Masalan: 1000$">
            </label>
            <label>
                <span>Ish turi</span>
                <input type="text" name="type" placeholder="Full-time">
            </label>
            <label>
                <span>Admin Parol *</span>
                <input type="password" name="password" required placeholder="Admin parolini kiriting">
            </label>
            <button type="submit">Vakansiyani e'lon qilish</button>
            <div id="formMessage" class="form-message"></div>
        </form>
    </section>

    <hr style="margin: 50px 0; border: none; border-top: 1px solid #ddd;">

    <section id="resumes" style="max-width: 1000px; margin: 0 auto; padding: 0 20px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Ish izlovchilar (Rezyumelar bazasi)</h2>
        <div id="resumesContainer" class="jobs-grid"></div>
        <div id="resumesLoading" class="info-text">Rezyumelar yuklanmoqda...</div>
        <div id="resumesEmpty" class="empty-state" style="display: none;">
            <h3>Hozircha rezyume yo'q</h3>
            <p>Baza hozircha bo'sh.</p>
        </div>
    </section>

    <footer>© 2026 IshTop.uz — Barcha huquqlar himoyalangan</footer>
    <script>
        // Set admin mode
        window.IS_ADMIN = true;
    </script>
    <script src="script.js"></script>
</body>

</html>
